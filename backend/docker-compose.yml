# Brandy Box backend + web UI - run on Raspberry Pi
# Usage (from this directory):
#   cp .env.example .env && edit .env, then: docker compose up -d --build
#   Build context is the repository root (parent); image includes the React web app.
#   Host port maps container 8080 → HOST_PORT (default 8081). Set HOST_PORT in .env to change
#   the LAN URL (e.g. http://192.168.0.150:8081). Cloudflare tunnel should target the same port.
#
# To use the pre-built image from GitHub Container Registry instead of building locally:
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
#   (see docker-compose.ghcr.yml)

services:
  brandybox:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: brandybox-backend
    ports:
      - "${HOST_PORT:-8081}:8080"
    environment:
      - BRANDYBOX_STORAGE_BASE_PATH=/mnt/shared_storage/brandyBox
      # Path for "Server disk (Pi)" in Settings (full HDD usage). Must be mounted; default uses storage path.
      - BRANDYBOX_SERVER_DISK_PATH=/mnt/shared_storage
      # Max storage for all users: e.g. 70% (default), 500GB, 1TB
      # BRANDYBOX_STORAGE_LIMIT=70%
      # DB lives in /data (mounted volume); default /data/brandybox.db
      # Set in .env: JWT_SECRET, SMTP_*, ADMIN_*, optional Google OAuth (must be listed here or the container never sees them)
      - BRANDYBOX_JWT_SECRET=${BRANDYBOX_JWT_SECRET}
      - BRANDYBOX_SMTP_HOST=${BRANDYBOX_SMTP_HOST}
      - BRANDYBOX_SMTP_PORT=${BRANDYBOX_SMTP_PORT:-587}
      - BRANDYBOX_SMTP_USER=${BRANDYBOX_SMTP_USER}
      - BRANDYBOX_SMTP_PASSWORD=${BRANDYBOX_SMTP_PASSWORD}
      - BRANDYBOX_SMTP_FROM=${BRANDYBOX_SMTP_FROM}
      - BRANDYBOX_ADMIN_EMAIL=${BRANDYBOX_ADMIN_EMAIL}
      - BRANDYBOX_ADMIN_INITIAL_PASSWORD=${BRANDYBOX_ADMIN_INITIAL_PASSWORD}
      - BRANDYBOX_CORS_ORIGINS=${BRANDYBOX_CORS_ORIGINS:-https://brandybox.brandstaetter.rocks}
      - BRANDYBOX_PUBLIC_BASE_URL=${BRANDYBOX_PUBLIC_BASE_URL:-}
      - BRANDYBOX_GOOGLE_CLIENT_ID=${BRANDYBOX_GOOGLE_CLIENT_ID:-}
      - BRANDYBOX_GOOGLE_CLIENT_SECRET=${BRANDYBOX_GOOGLE_CLIENT_SECRET:-}
    volumes:
      # Persist SQLite DB
      - brandybox_data:/data
      # Mount Pi HDD so backend can read/write user folders and report full disk usage in Settings
      - /mnt/shared_storage:/mnt/shared_storage
    restart: unless-stopped

volumes:
  brandybox_data:
