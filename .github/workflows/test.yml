# Run unit tests (backend pytest, client-tauri cargo test), build client-tauri, and optional E2E.
# E2E runs against a backend container started in CI (test admin credentials).

name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: cd backend && python -m pytest -v --tb=short

  client-tauri:
    name: Client-tauri (cargo test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: client-tauri/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "client-tauri/src-tauri -> target"

      - name: Install npm dependencies
        run: cd client-tauri && npm ci

      - name: Run cargo test
        run: cd client-tauri/src-tauri && cargo test

      - name: Build Tauri client
        run: cd client-tauri && npm run tauri:build

      - name: Tar Tauri release for E2E
        run: |
          tar czf tauri-release.tar.gz -C client-tauri/src-tauri/target release/

      - name: Upload Tauri release for E2E
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-linux
          path: tauri-release.tar.gz

  e2e:
    name: E2E (sync scenario)
    runs-on: ubuntu-latest
    needs: [backend, client-tauri]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Tauri release
        uses: actions/download-artifact@v4
        with:
          name: tauri-release-linux

      - name: Extract binary for E2E runner
        run: |
          mkdir -p client-tauri/src-tauri/target
          tar xzf tauri-release.tar.gz -C client-tauri/src-tauri/target
          chmod +x client-tauri/src-tauri/target/release/brandybox

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (backend + client for E2E)
        run: |
          pip install -r backend/requirements.txt
          pip install -e client/

      - name: Build backend image for E2E
        run: docker build -t brandybox-backend-e2e ./backend

      - name: Start backend container
        run: |
          mkdir -p /tmp/brandybox-e2e-data
          docker run -d --name brandybox-e2e \
            -p 8081:8080 \
            -v /tmp/brandybox-e2e-data:/data \
            -e BRANDYBOX_JWT_SECRET=test-jwt-secret-at-least-32-characters-long \
            -e BRANDYBOX_ADMIN_EMAIL=test@example.com \
            -e BRANDYBOX_ADMIN_INITIAL_PASSWORD=testpass123 \
            -e BRANDYBOX_DB_PATH=/data/brandybox.db \
            -e BRANDYBOX_STORAGE_BASE_PATH=/data/storage \
            -e BRANDYBOX_CORS_ORIGINS='*' \
            brandybox-backend-e2e
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8081/health | grep -q '"status":"ok"'; then break; fi
            if [ "$i" -eq 30 ]; then echo "Backend did not become ready"; exit 1; fi
            sleep 1
          done

      - name: Run E2E autonomous sync
        env:
          BRANDYBOX_BASE_URL: http://localhost:8081
          BRANDYBOX_ADMIN_EMAIL: test@example.com
          BRANDYBOX_ADMIN_PASSWORD: testpass123
          BRANDYBOX_SYNC_FOLDER: ${{ github.workspace }}/tests/e2e/sync_test_dir
        run: |
          mkdir -p tests/e2e/sync_test_dir
          python -m tests.e2e.run_autonomous_sync

      - name: Backend logs on failure
        if: failure()
        run: docker logs brandybox-e2e 2>&1 | tail -200
