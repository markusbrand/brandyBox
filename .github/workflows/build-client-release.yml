# Build Brandy Box Tauri client (Windows, Linux, macOS) and attach artifacts to GitHub Releases.
# Each platform is built on GitHub's native runner (Windows/Linux/macOS). Trigger from any device
# (Actions → Build Client for Release → Run workflow); all four jobs run on GitHub, not on your machine.

name: Build Client for Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to build and attach assets to (e.g. v0.2.3). Leave empty to only build (no attach).'
        required: false
        type: string
      build_ref:
        description: 'Ref to build from (e.g. master). Leave empty to build from the release tag.'
        required: false
        type: string

env:
  VERSION: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'dev' }}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --bundles deb,rpm,appimage
            rust_target: ''
          - platform: windows-latest
            args: --bundles nsis
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    env:
      CI: "false"
      TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.platform == 'macos-latest' && 'true' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # When build_ref is set (e.g. master), build from that ref and still upload to release_tag
          ref: ${{ github.event.inputs.build_ref || github.event.release.tag_name || github.event.inputs.release_tag || github.ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: client-tauri/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'client-tauri/src-tauri -> target'

      - name: Install frontend dependencies
        run: |
          cd client-tauri
          npm ci

      # Linux: custom build + upload so we attach deb, rpm, and appimage (Red Hat, SUSE, Arch/portable)
      - name: Build Tauri (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd client-tauri
          npm run tauri build -- ${{ matrix.args }}

      - name: Upload to release (Linux)
        if: matrix.platform == 'ubuntu-22.04' && (github.event.release.tag_name || github.event.inputs.release_tag)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.release_tag }}"
          BUNDLE="client-tauri/src-tauri/target/release/bundle"
          echo "Uploading Linux artifacts from $BUNDLE to release $TAG"
          set -e
          for dir in deb rpm appimage; do
            [ -d "$BUNDLE/$dir" ] || continue
            for f in "$BUNDLE/$dir"/*; do
              [ -f "$f" ] && { echo "Uploading $f"; gh release upload "$TAG" "$f" --clobber; }
            done
          done

      # macOS: custom build + upload (tauri-action often fails to find artifacts when using --target and projectPath)
      - name: Build Tauri (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cd client-tauri
          npm run tauri build -- ${{ matrix.args }}

      - name: Upload to release (macOS)
        if: matrix.platform == 'macos-latest' && (github.event.release.tag_name || github.event.inputs.release_tag)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.release_tag }}"
          BUNDLE="client-tauri/src-tauri/target/${{ matrix.rust_target }}/release/bundle"
          echo "Uploading from $BUNDLE to release $TAG"
          # Paths may contain spaces (e.g. "Brandy Box.dmg"); quote when passing to gh
          set -e
          for f in "$BUNDLE/dmg/"*.dmg "$BUNDLE/macos/"*.app.tar.gz; do
            [ -f "$f" ] || continue
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
          done

      # Windows only: use tauri-action for build and upload (Linux/macOS use custom steps above)
      - name: Build and upload to release
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client-tauri
          tagName: ${{ github.event.release.tag_name || github.event.inputs.release_tag || '' }}
          releaseName: Brandy Box ${{ env.VERSION }}
          releaseBody: See the assets below to download and install.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          retryAttempts: 2
