# Build Brandy Box Tauri client (Windows, Linux, macOS) and attach artifacts to GitHub Releases.
# Uses official tauri-action for reliable builds and uploads per platform.

name: Build Client for Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to build and attach assets to (e.g. v0.2.3). Leave empty to only build (no attach).'
        required: false
        type: string

env:
  VERSION: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'dev' }}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}
    env:
      CI: "false"
      TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.platform == 'macos-latest' && 'true' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.release_tag || github.ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: client-tauri/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'client-tauri/src-tauri -> target'

      - name: Install frontend dependencies
        run: |
          cd client-tauri
          npm ci

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client-tauri
          # Omit tagName/releaseName to only build (no upload); set when releasing
          tagName: ${{ github.event.release.tag_name || github.event.inputs.release_tag || '' }}
          releaseName: Brandy Box ${{ env.VERSION }}
          releaseBody: See the assets below to download and install.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
